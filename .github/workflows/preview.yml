name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  WORKER_PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
  NEON_PREVIEW_BRANCH: preview/pr-${{ github.event.pull_request.number }}

jobs:
  cd-disabled:
    name: CD disabled
    if: vars.CD_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice title=CD disabled::Deployments are off. To enable CD, delete this \`cd-disabled\` job and remove every \`if: vars.CD_ENABLED\` condition in this file — that is simpler than setting a \`CD_ENABLED\` repository variable. If you do not use CD, delete this workflow file."

  preview:
    name: Preview (Worker + SPA)
    if: vars.CD_ENABLED == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    environment:
      name: preview
      url: ${{ steps.worker.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Neon preview branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ env.NEON_PREVIEW_BRANCH }}
          api_key: ${{ secrets.NEON_API_KEY }}
          username: ${{ vars.NEON_DATABASE_USER }}
          database: ${{ vars.NEON_DATABASE_NAME || 'neondb' }}

      - name: Run migrations on preview branch
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: pnpm db:migrate:deploy

      - name: Build Worker and SPA
        run: pnpm --filter worker build

      - name: Upload preview Worker (SPA + API)
        id: worker_initial
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: apps/worker
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            versions upload
            --preview-alias ${{ env.WORKER_PREVIEW_ALIAS }}
            --keep-vars
            --var DATABASE_URL:${{ steps.neon.outputs.db_url }}
            --message "Preview PR ${{ github.event.pull_request.number }}"

      - name: Parse preview URL
        id: preview_url
        env:
          CMD_OUTPUT: ${{ steps.worker_initial.outputs.command-output }}
          FALLBACK_URL: ${{ steps.worker_initial.outputs.deployment-url }}
        run: |
          URL=$(printf '%s\n' "$CMD_OUTPUT" | sed -n 's/.*Version Preview Alias URL:[[:space:]]*\(https[^[:space:]]*\).*/\1/p' | head -1)
          if [ -z "$URL" ]; then
            URL="${FALLBACK_URL%/}"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Configure preview auth
        id: worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: apps/worker
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            versions upload
            --preview-alias ${{ env.WORKER_PREVIEW_ALIAS }}
            --keep-vars
            --var DATABASE_URL:${{ steps.neon.outputs.db_url }}
            --var BETTER_AUTH_URL:${{ steps.preview_url.outputs.url }}/
            --message "Preview PR ${{ github.event.pull_request.number }} auth"

      - name: Resolve preview URL
        id: resolve_preview_url
        env:
          CMD_OUTPUT: ${{ steps.worker.outputs.command-output }}
          FALLBACK_URL: ${{ steps.preview_url.outputs.url }}
        run: |
          URL=$(printf '%s\n' "$CMD_OUTPUT" | sed -n 's/.*Version Preview Alias URL:[[:space:]]*\(https[^[:space:]]*\).*/\1/p' | head -1)
          if [ -z "$URL" ]; then
            URL="${FALLBACK_URL%/}"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.resolve_preview_url.outputs.url }}
          NEON_BRANCH: ${{ env.NEON_PREVIEW_BRANCH }}
        with:
          script: |
            const marker = "<!-- cloudflare-preview -->";
            const previewUrl = process.env.PREVIEW_URL;
            const neonBranch = process.env.NEON_BRANCH;
            const prNumber = context.payload.pull_request.number;

            const body = [
              marker,
              `### Cloudflare preview (PR #${prNumber})`,
              "",
              `**App:** ${previewUrl}`,
              "",
              `Neon branch: \`${neonBranch}\` (copy of \`main\` at first open; migrations applied on each push).`,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find((comment) =>
              comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
