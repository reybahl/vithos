name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  WORKER_PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}

jobs:
  preview:
    name: Preview (Worker + SPA)
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web (same-origin /api on preview Worker)
        run: pnpm --filter web build

      - name: Upload preview Worker (SPA + API)
        id: worker_initial
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: apps/worker
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            versions upload
            --config wrangler.preview.toml
            --preview-alias ${{ env.WORKER_PREVIEW_ALIAS }}
            --keep-vars
            --message "Preview PR ${{ github.event.pull_request.number }}"

      - name: Parse preview URL
        id: preview_url
        env:
          CMD_OUTPUT: ${{ steps.worker_initial.outputs.command-output }}
          FALLBACK_URL: ${{ steps.worker_initial.outputs.deployment-url }}
        run: |
          URL=$(printf '%s\n' "$CMD_OUTPUT" | sed -n 's/.*Version Preview Alias URL:[[:space:]]*\(https[^[:space:]]*\).*/\1/p' | head -1)
          if [ -z "$URL" ]; then
            URL="${FALLBACK_URL%/}"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Configure preview auth (same-origin)
        id: worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: apps/worker
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            versions upload
            --config wrangler.preview.toml
            --preview-alias ${{ env.WORKER_PREVIEW_ALIAS }}
            --keep-vars
            --var BETTER_AUTH_URL:${{ steps.preview_url.outputs.url }}/
            --var CORS_ALLOWED_ORIGINS:${{ steps.preview_url.outputs.url }}
            --var BETTER_AUTH_TRUSTED_ORIGINS:${{ steps.preview_url.outputs.url }}
            --message "Preview PR ${{ github.event.pull_request.number }} auth"

      - name: Resolve preview URL
        id: resolve_preview_url
        env:
          CMD_OUTPUT: ${{ steps.worker.outputs.command-output }}
          FALLBACK_URL: ${{ steps.preview_url.outputs.url }}
        run: |
          URL=$(printf '%s\n' "$CMD_OUTPUT" | sed -n 's/.*Version Preview Alias URL:[[:space:]]*\(https[^[:space:]]*\).*/\1/p' | head -1)
          if [ -z "$URL" ]; then
            URL="${FALLBACK_URL%/}"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.resolve_preview_url.outputs.url }}
        with:
          script: |
            const marker = "<!-- cloudflare-preview -->";
            const previewUrl = process.env.PREVIEW_URL;
            const prNumber = context.payload.pull_request.number;

            const body = [
              marker,
              `### Cloudflare preview (PR #${prNumber})`,
              "",
              `**App:** ${previewUrl}`,
              "",
              "Single Worker URL serves the SPA and `/api/*` (same-origin auth). Production is unchanged.",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find((comment) =>
              comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
