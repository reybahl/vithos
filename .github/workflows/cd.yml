name: CD

on:
  push:
    branches: [main]

env:
  CF_PAGES_PROJECT_NAME: vithos

jobs:
  db-migrate:
    name: Database migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run database migrations
        id: migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: |
          echo "Starting database migrations..."
          pnpm db:migrate:deploy
          echo "Database migrations completed successfully"

  worker:
    name: Backend (Worker)
    runs-on: ubuntu-latest
    needs: [db-migrate]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: apps/worker
          command: >-
            deploy
            --var BETTER_AUTH_URL:${{ vars.API_URL }}
            --var CORS_ALLOWED_ORIGINS:${{ vars.WEB_ORIGIN }}
            --var BETTER_AUTH_TRUSTED_ORIGINS:${{ vars.WEB_ORIGIN }}

  pages:
    name: Frontend (Pages)
    runs-on: ubuntu-latest
    needs: [worker]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter web build
        env:
          # API origin with trailing slash, e.g. https://api.vithos.reybahl.com/
          VITE_API_URL: ${{ vars.API_URL }}
      - name: Deploy Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: apps/worker
          command: pages deploy ../web/dist --project-name=${{ env.CF_PAGES_PROJECT_NAME }}
