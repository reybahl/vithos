name: CD

on:
  push:
    branches: [main]

env:
  CF_PAGES_PROJECT_NAME: vithos

jobs:
  worker:
    name: Backend (Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: apps/worker
          command: deploy

  pages:
    name: Frontend (Pages)
    runs-on: ubuntu-latest
    needs: [worker]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter web build
        env:
          # Repo variable: Worker origin with trailing slash, e.g. https://vithos-api.<account>.workers.dev/
          VITE_API_URL: ${{ vars.WORKER_URL }}
      - name: Deploy Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=${{ env.CF_PAGES_PROJECT_NAME }}
