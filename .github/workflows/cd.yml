name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cd-disabled:
    name: CD disabled
    if: vars.CD_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice title=CD disabled::Deployments are off. To enable CD, delete this \`cd-disabled\` job and remove every \`if: vars.CD_ENABLED\` condition in this file — that is simpler than setting a \`CD_ENABLED\` repository variable. If you do not use CD, delete this workflow file."

  db-migrate:
    name: Database migrations
    if: vars.CD_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run database migrations
        id: migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: |
          echo "Starting database migrations..."
          pnpm db:migrate:deploy
          echo "Database migrations completed successfully"

  worker:
    name: Deploy to Cloudflare (Worker + SPA)
    if: vars.CD_ENABLED == 'true'
    runs-on: ubuntu-latest
    needs: [db-migrate]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter web build
      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: apps/worker
          command: >-
            deploy
            --var BETTER_AUTH_URL:${{ vars.WEB_ORIGIN }}/
