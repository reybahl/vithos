name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  HUSKY: 0

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - parallel:
          - name: Typecheck
            run: pnpm typecheck
          - name: Lint
            run: pnpm lint
          - name: Format
            run: pnpm format
