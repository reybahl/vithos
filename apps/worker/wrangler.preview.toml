# Preview-only: bundles the Vite build so one workers.dev URL serves SPA + /api (same-origin auth).
# Production uses wrangler.toml (API only); frontend stays on Pages.
name = "vithos-api"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "8c4dcf21a5d24475a98a549dd4e9eb47"

[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true
