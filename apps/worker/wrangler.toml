name = "vithos-api"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

# Set account_id via `wrangler whoami` output, env CF_ACCOUNT_ID, or the deploy action.
# Browser API + cookies: set `CORS_ALLOWED_ORIGINS` (comma-separated) in Dashboard / `.dev.vars`
# (e.g. `https://vithos.reybahl.com`; must match the browser `Origin` header). Wired in `apps/worker`.

[observability.logs]
enabled = false
invocation_logs = true