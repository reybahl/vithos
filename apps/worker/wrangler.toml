name = "vithos-api"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

# Postgres: Hyperdrive `vithos-db`. For Neon, origin must be the DIRECT connection string
# (disable "pooling" in Neon UI)—not the `*-pooler.*` host. Hyperdrive pools; double poolers hang/break.
# Update origin: `wrangler hyperdrive update 8c4dcf21a5d24475a98a549dd4e9eb47 --connection-string="postgres://..."`
# https://developers.cloudflare.com/hyperdrive/examples/neon/
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "8c4dcf21a5d24475a98a549dd4e9eb47"

# Set account_id via `wrangler whoami` output, env CF_ACCOUNT_ID, or the deploy action.
# Browser API + cookies: set `CORS_ALLOWED_ORIGINS` (comma-separated) in Dashboard / `.dev.vars`
# (e.g. `https://vithos.reybahl.com`; must match the browser `Origin` header). Wired in `apps/worker`.

# https://developers.cloudflare.com/workers/observability/logs/workers-logs/
[observability]
enabled = true
head_sampling_rate = 1 # 1 = every request; lower later if log volume/cost matters

[observability.logs]
invocation_logs = true
